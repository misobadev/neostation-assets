name: Sync theme systems

on:
  push:
    branches: [main]
    paths:
      - 'themes/**/backgrounds/**'
      - 'themes/**/theme.json'
      - 'scripts/gen-theme-systems.sh'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Regenerate systems lists
        run: |
          chmod +x scripts/gen-theme-systems.sh
          scripts/gen-theme-systems.sh
      - name: Commit changes
        run: |
          if [ -n "$(git status --porcelain)" ]; then
            git config user.name  "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add themes/**/theme.json
            git commit -m "chore: sync theme.json systems lists [skip ci]"
            git push
          else
            echo "No changes to commit"
          fi
